<body>

<script>
window.MFC_RECIPE_ID = new URLSearchParams(location.search).get('id') || '';
</script>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="recipe-app.jsx"></script>
<script type="text/babel" src="recipe-components.jsx"></script>

<script type="text/babel" data-presets="react">
const RECIPE_TWEAK_DEFAULTS = {
  "accent": "#FF6D2E",
  "secondAccent": "#7A9C5A",
  "bg": "#F7F1E3"
};

const MEAL_LOG_STYLE = `
.mfc-meallog{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);z-index:200;
  background:var(--paper,#FFFCF3);border:1px solid var(--ink-faint,rgba(31,29,26,.18));
  border-radius:14px;padding:14px 16px;box-shadow:0 18px 50px rgba(31,29,26,.18);
  font-family:var(--sans);display:flex;gap:12px;align-items:center;flex-wrap:wrap;max-width:560px}
.mfc-meallog b{font-family:var(--serif);font-style:italic;font-weight:500;font-size:18px;color:var(--ink)}
.mfc-meallog select,.mfc-meallog input{font:inherit;font-size:13px;padding:6px 10px;
  border:1px solid var(--ink-faint,rgba(31,29,26,.18));border-radius:8px;background:transparent;color:var(--ink)}
.mfc-meallog input{width:60px}
.mfc-meallog button{font:inherit;font-size:13px;font-weight:500;padding:8px 14px;
  border-radius:999px;border:none;cursor:pointer;background:var(--orange,#FF6D2E);color:#FFFCF3}
.mfc-meallog button.ghost{background:transparent;color:var(--ink-muted);text-decoration:underline}
.mfc-meallog .ok{color:var(--matcha,#7A9C5A);font-family:var(--mono);font-size:12px}
`;

function MealLogPrompt({ recipe, onLogged }) {
  const [mealType, setMealType] = React.useState('dinner');
  const [servings, setServings] = React.useState(recipe.servings || 1);
  const [busy, setBusy] = React.useState(false);
  const [done, setDone] = React.useState(false);
  const [dismissed, setDismissed] = React.useState(false);
  if (dismissed) return null;
  async function submit() {
    setBusy(true);
    const ok = await window.MFC?.db?.logMeal({
      recipeId: recipe.id, mealType, servings: Number(servings) || null,
      source: 'cooking_session_complete',
    });
    setBusy(false);
    if (ok) { setDone(true); onLogged && onLogged(); setTimeout(() => setDismissed(true), 1800); }
  }
  return (
    <>
      <style>{MEAL_LOG_STYLE}</style>
      <div className="mfc-meallog">
        {done ? <span className="ok">✓ logged</span> : (
          <>
            <b>Log this meal?</b>
            <select value={mealType} onChange={e => setMealType(e.target.value)}>
              <option value="breakfast">breakfast</option>
              <option value="lunch">lunch</option>
              <option value="dinner">dinner</option>
              <option value="snack">snack</option>
            </select>
            <input type="number" min="0.25" step="0.25" value={servings} onChange={e => setServings(e.target.value)} />
            <button disabled={busy} onClick={submit}>{busy ? '…' : 'Log'}</button>
            <button className="ghost" onClick={() => setDismissed(true)}>skip</button>
          </>
        )}
      </div>
    </>
  );
}

function useAuth() {
  const [user, setUser] = React.useState(window.MFC?.auth?.getUser() || null);
  React.useEffect(() => {
    const handler = (e) => setUser(e.detail.user);
    window.addEventListener('mfc:auth-change', handler);
    return () => window.removeEventListener('mfc:auth-change', handler);
  }, []);
  return user;
}

function RecipeApp() {
  const [t, setTweak] = useTweaks(RECIPE_TWEAK_DEFAULTS);
  const [recipe, setRecipe] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [stepIdx, setStepIdx] = React.useState(0);
  const [doneSteps, setDoneSteps] = React.useState(new Set());
  const user = useAuth();
  const [mealLogged, setMealLogged] = React.useState(false);
  const [saved, setSaved] = React.useState(false);
  const [justSaved, setJustSaved] = React.useState(false);

  React.useEffect(() => {
    const id = window.MFC_RECIPE_ID;
    if (!id) { setLoading(false); return; }
    window.MFC.db.getRecipe(id)
      .then(data => {
        if (!data) { setLoading(false); return; }
        document.title = data.name + ' — MyFoodCraving';
        setRecipe(data);
        setLoading(false);
      })
      .catch(() => setLoading(false));
  }, []);

  // Load saved state for this recipe
  React.useEffect(() => {
    if (!user || !recipe) { setSaved(false); return; }
    let cancelled = false;
    window.MFC?.db?.getSaved().then(rows => {
      if (cancelled) return;
      setSaved((rows || []).some(r => r.recipe_id === recipe.id));
    });
    return () => { cancelled = true; };
  }, [user, recipe?.id]);

  function toggleSave() {
    if (!user || !recipe) return;
    const next = !saved;
    setSaved(next);
    if (next) {
      setJustSaved(true);
      setTimeout(() => setJustSaved(false), 500);
      window.MFC?.db?.saveRecipe(recipe.id);
    } else {
      window.MFC?.db?.unsaveRecipe(recipe.id);
    }
  }
  function requestSignIn() {
    window.MFC?.auth?.signIn?.();
  }

  // Resume cooking session for logged-in user
  React.useEffect(() => {
    if (!user || !recipe) return;
    let cancelled = false;
    window.MFC?.db?.getSession(recipe.id).then(s => {
      if (cancelled || !s || s.completed_at) return;
      const idx = Math.max(0, Math.min(s.current_step ?? 0, recipe.steps.length - 1));
      setStepIdx(idx);
      const done = new Set();
      for (let i = 0; i < idx; i++) done.add(i);
      setDoneSteps(done);
    });
    return () => { cancelled = true; };
  }, [user, recipe?.id]);

  // Persist session progress (debounced)
  React.useEffect(() => {
    if (!user || !recipe) return;
    const timer = setTimeout(() => {
      window.MFC?.db?.upsertSession({
        recipeId: recipe.id,
        currentStep: stepIdx,
        servings: recipe.servings,
      });
    }, 600);
    return () => clearTimeout(timer);
  }, [user, recipe?.id, stepIdx]);

  // Mark complete + invite to log meal when all steps done
  const allDone = recipe && doneSteps.size >= recipe.steps.length;
  React.useEffect(() => {
    if (!user || !recipe || !allDone) return;
    window.MFC?.db?.upsertSession({
      recipeId: recipe.id,
      currentStep: recipe.steps.length - 1,
      servings: recipe.servings,
      completedAt: new Date().toISOString(),
    });
  }, [user, recipe?.id, allDone]);

  React.useEffect(() => {
    const root = document.documentElement;
    root.style.setProperty("--orange", t.accent);
    root.style.setProperty("--matcha", t.secondAccent);
    root.style.setProperty("--cream", t.bg);
  }, [t]);

  if (loading) return (
    <>
      <RecipeNav />
      <div style={{ height: "80vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
        <p style={{ fontFamily: "var(--serif)", fontStyle: "italic", color: "var(--ink-muted)", fontSize: 22 }}>loading recipe…</p>
      </div>
    </>
  );

  if (!recipe) return (
    <>
      <RecipeNav />
      <div style={{ height: "80vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
        <p style={{ fontFamily: "var(--serif)", fontStyle: "italic", color: "var(--ink-muted)", fontSize: 22 }}>recipe not found</p>
      </div>
    </>
  );

  return (
    <>
      <RecipeNav />
      <main className="recipe-page">
        <div className="wrap">
          <div className="r-breadcrumb">
            <a href={(window.MFC_BASE || '') + 'index.html'}>home</a>
            <span>›</span>
            <a href={(window.MFC_BASE || '') + 'recipe-search.html'}>{recipe.cuisine}</a>
            <span>›</span>
            <span className="current">{recipe.name.toLowerCase()}</span>
          </div>

          <RecipeHero
            recipe={recipe}
            saved={saved}
            onToggleSave={toggleSave}
            user={user}
            onRequestSignIn={requestSignIn}
            justSaved={justSaved}
          />

          <div className="r-stage">
            <StepCard recipe={recipe} stepIdx={stepIdx} doneSteps={doneSteps} />
            <aside className="r-side">
              <IngredientsCard recipe={recipe} />
              <UtensilsCard recipe={recipe} />
            </aside>
          </div>

          <HealthMarquee facts={recipe.healthFacts} />
        </div>
      </main>

      <CookingPlayer
        recipe={recipe}
        stepIdx={stepIdx}
        setStepIdx={setStepIdx}
        doneSteps={doneSteps}
        setDoneSteps={setDoneSteps}
      />

      {user && allDone && !mealLogged && (
        <MealLogPrompt recipe={recipe} onLogged={() => setMealLogged(true)} />
      )}

      <TweaksPanel>
        <TweakSection label="Palette" />
        <TweakColor label="Primary accent" value={t.accent} onChange={(v) => setTweak("accent", v)} />
        <TweakColor label="Health accent" value={t.secondAccent} onChange={(v) => setTweak("secondAccent", v)} />
        <TweakColor label="Background" value={t.bg} onChange={(v) => setTweak("bg", v)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<RecipeApp />);
</script>

</body>
</html>
