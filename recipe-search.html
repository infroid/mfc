  --ink-muted: #6B6253;
  --ink-faint: #9A8F7C;
  --rule: rgba(31, 26, 20, 0.14);
  --rule-strong: rgba(31, 26, 20, 0.28);
  --orange: #FF6D2E;
  --orange-deep: #E2531A;
  --orange-soft: rgba(255, 109, 46, 0.14);
  --matcha: #7A9C5A;
  --matcha-deep: #5E7E40;
  --matcha-soft: rgba(122, 156, 90, 0.18);
  --sans: "Geist", ui-sans-serif, system-ui, -apple-system, sans-serif;
  --serif: "Instrument Serif", "Times New Roman", Georgia, serif;

  --mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;

  --r-md: 12px;

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
body { font-family: var(--sans); font-size: 16px; line-height: 1.55; color: var(--ink); background: var(--cream); overflow-x: hidden; }
a { color: inherit; text-decoration: none; }
button { font: inherit; color: inherit; cursor: pointer; border: none; }
::selection { background: var(--orange); color: var(--paper); }

body::before {
  content: "";

}

/* NAV */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 50; height: 64px;
  display: flex; align-items: center;
  transition: background 250ms, border-color 250ms;
  border-bottom: 1px solid transparent;
}
.nav.scrolled {
  background: rgba(247, 241, 227, 0.88);
  -webkit-backdrop-filter: blur(14px) saturate(160%);

  border-bottom-color: var(--rule);
}
.nav-inner {
  width: 100%; max-width: var(--container); margin: 0 auto; padding: 0 28px;
  display: flex; align-items: center; justify-content: space-between; gap: 24px;
}
.brand { display: flex; align-items: center; gap: 10px; font-weight: 600; letter-spacing: -0.02em; }
.brand-mark {
  display: inline-grid; place-items: center; width: 32px; height: 32px;
  background: var(--orange); color: var(--paper);
  font-family: var(--serif); font-style: italic; font-size: 22px;
  border-radius: 50%; transform: rotate(-6deg);
}
.brand-name { font-size: 17px; }
.brand-name em { font-family: var(--serif); font-weight: 400; font-style: italic; }
.nav-links { display: flex; align-items: center; gap: 28px; }
.nav-links a { font-size: 14px; color: var(--ink-soft); transition: color 200ms; }
.nav-links a:hover, .nav-links a.active { color: var(--orange); }
.btn-nav {
  background: var(--ink); color: var(--paper);
  padding: 10px 20px; border-radius: 999px; font-size: 14px; font-weight: 500;
  transition: background 200ms;
}
.btn-nav:hover { background: var(--orange); }

/* LAYOUT */
.wrap { max-width: var(--container); margin: 0 auto; padding: 0 28px; position: relative; z-index: 2; }

/* SEARCH HERO */
.search-hero { padding: 112px 0 56px; position: relative; z-index: 2; text-align: center; }
.hero-eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 14px; background: var(--paper); border: 1px solid var(--rule);
  border-radius: 999px; font-family: var(--mono); font-size: 11px;
  letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 24px;
}
.eyebrow-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--orange); box-shadow: 0 0 0 3px var(--orange-soft); }
.hero-h1 {
  font-family: var(--sans); font-weight: 500;
  font-size: clamp(42px, 5.8vw, 76px); line-height: 1.0; letter-spacing: -0.035em;
}
.hero-h1 em { font-family: var(--serif); font-style: italic; font-weight: 400; color: var(--orange); }
.hero-sub { margin-top: 16px; font-size: 18px; color: var(--ink-soft); }

.search-box {
  margin: 32px auto 0; max-width: 620px;
  background: var(--paper); border: 1.5px solid var(--ink); border-radius: 999px;
  display: flex; align-items: center; gap: 12px;
  padding: 8px 8px 8px 24px;
  box-shadow: 0 5px 0 var(--ink); transition: box-shadow 200ms, border-color 200ms;
}
.search-box:focus-within { border-color: var(--orange); box-shadow: 0 5px 0 var(--orange); }
.search-input {
  flex: 1; border: none; background: transparent; outline: none;
  font-family: var(--serif); font-style: italic; font-size: 22px; color: var(--ink);
}
.search-input::placeholder { color: var(--ink-faint); }
.search-clear {
  background: none; padding: 4px 8px; font-size: 18px; color: var(--ink-muted); line-height: 1;
  transition: color 150ms;
}
.search-clear:hover { color: var(--ink); }
.search-btn {
  flex-shrink: 0; width: 46px; height: 46px; border-radius: 50%;
  background: var(--orange); color: var(--paper);
  display: grid; place-items: center; font-size: 20px;
  box-shadow: 0 3px 0 var(--orange-deep); transition: transform 150ms;
}
.search-btn:hover { transform: scale(1.06); }

.filter-row { margin-top: 16px; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
.filter-chip {
  padding: 6px 14px; border-radius: 999px; background: var(--paper);
  border: 1px solid var(--rule); font-size: 13px; color: var(--ink-soft);
  cursor: pointer; transition: all 160ms;
}
.filter-chip:hover { background: var(--cream-deep); }
.filter-chip.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

/* SECTIONS */
.section { padding: 56px 0; position: relative; z-index: 2; }
.section + .section { padding-top: 0; }
.section-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; margin-bottom: 28px; }
.section-label { font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 6px; }
.section-title { font-family: var(--sans); font-weight: 500; font-size: clamp(26px, 3.2vw, 40px); line-height: 1.05; letter-spacing: -0.03em; }
.section-title em { font-family: var(--serif); font-style: italic; font-weight: 400; color: var(--orange); }
.count-badge {
  flex-shrink: 0; padding: 6px 14px; background: var(--paper);
  border: 1px solid var(--rule); border-radius: 999px;
  font-family: var(--mono); font-size: 12px; color: var(--ink-muted); white-space: nowrap;
}

/* FEATURED GRID */
.featured-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
.featured-card {
  background: var(--paper); border: 1.5px solid var(--ink); border-radius: var(--r-lg);
  overflow: hidden; box-shadow: 4px 4px 0 var(--ink);
  transition: transform 200ms, box-shadow 200ms;
  display: flex; flex-direction: column;
}
.featured-card:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--ink); }
.fc-top {
  height: 160px; position: relative; display: grid; place-items: center;
}
.fc-emoji { font-size: 68px; line-height: 1; filter: drop-shadow(0 4px 16px rgba(0,0,0,0.22)); position: relative; z-index: 2; }
.fc-cuisine {
  position: absolute; bottom: 10px; left: 12px; z-index: 3;
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 4px 10px; background: rgba(255, 252, 243, 0.92); color: var(--ink); border-radius: 999px;
}
.fc-badge {
  position: absolute; top: 10px; right: 12px; z-index: 3;
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase;
  padding: 4px 10px; background: var(--ink); color: var(--paper); border-radius: 999px;
}
.fc-body { padding: 20px; flex: 1; display: flex; flex-direction: column; gap: 10px; }
.fc-name { font-family: var(--serif); font-style: italic; font-size: 27px; line-height: 1.1; }
.fc-tagline { font-size: 14px; color: var(--ink-soft); line-height: 1.4; }
.fc-meta {
  display: flex; align-items: center; gap: 16px;
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-muted);
}
.fc-meta span { display: flex; align-items: center; gap: 4px; }
.fc-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 2px; }
.tag-pill {
  padding: 4px 10px; border-radius: 999px; font-size: 12px;
  background: var(--cream-deep); color: var(--ink-soft); border: 1px solid var(--rule);

.tag-pill.veg { background: var(--matcha-soft); color: var(--matcha-deep); }
.tag-pill.nonveg { background: var(--orange-soft); color: var(--orange-deep); }
.fc-highlight {
  margin-top: auto; padding-top: 10px; border-top: 1px dashed var(--rule-strong);
  font-size: 13px; color: var(--matcha-deep); display: flex; align-items: center; gap: 6px;
}
.fc-cta {
  display: flex; align-items: center; justify-content: space-between;
  padding: 13px 20px; border-top: 1.5px solid var(--ink);
  background: var(--cream-deep); font-family: var(--mono); font-size: 12px;
  font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink);
}

/* RECIPE GRID */
.recipe-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.recipe-card {
  background: var(--paper); border: 1.5px solid var(--ink); border-radius: var(--r-md);
  display: flex; align-items: stretch; overflow: hidden;
  box-shadow: 3px 3px 0 var(--ink);
  transition: transform 180ms, box-shadow 180ms;
}
.recipe-card:hover { transform: translate(-2px, -2px); box-shadow: 5px 5px 0 var(--ink); }
.rc-left {
  width: 68px; flex-shrink: 0; display: grid; place-items: center;
  font-size: 30px;
}
.rc-body { flex: 1; padding: 12px 12px 12px 0; min-width: 0; }
.rc-name { font-family: var(--serif); font-style: italic; font-size: 17px; line-height: 1.2; margin-bottom: 4px; }
.rc-meta {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--ink-muted); margin-bottom: 7px;
  display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
}
.rc-meta-sep { color: var(--rule-strong); }
.rc-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.rc-tag {
  padding: 3px 8px; border-radius: 999px; font-size: 11px;
  background: var(--cream-deep); color: var(--ink-muted); border: 1px solid var(--rule);
}
.rc-tag.veg { background: var(--matcha-soft); color: var(--matcha-deep); }
.rc-tag.nonveg { background: var(--orange-soft); color: var(--orange-deep); }
.rc-arrow { flex-shrink: 0; padding: 0 14px; display: grid; place-items: center; font-size: 18px; color: var(--ink-muted); transition: color 150ms; }
.recipe-card:hover .rc-arrow { color: var(--orange); }

/* NO RESULTS */
.no-results { text-align: center; padding: 72px 24px; }
.no-results .hand { font-family: var(--hand); font-size: 44px; color: var(--orange); display: block; margin-bottom: 10px; }
.no-results p { font-family: var(--serif); font-style: italic; font-size: 24px; color: var(--ink-soft); }

/* DIVIDER */
.divider { border: none; border-top: 1px solid var(--rule); margin: 0; position: relative; z-index: 2; }

/* FOOTER */
.footer { border-top: 1px solid var(--rule); padding: 32px 0; position: relative; z-index: 2; }
.footer-inner { display: flex; align-items: center; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
.footer-copy { font-family: var(--mono); font-size: 11px; color: var(--ink-muted); }

/* RESPONSIVE */
@media (max-width: 960px) {
  .featured-grid { grid-template-columns: 1fr 1fr; }
  .recipe-grid { grid-template-columns: 1fr 1fr; }
  .nav-links { display: none; }
}
@media (max-width: 640px) {
  .featured-grid { grid-template-columns: 1fr; }
  .recipe-grid { grid-template-columns: 1fr; }
  .wrap { padding: 0 20px; }
  .search-hero { padding-top: 96px; }
  .section-head { flex-direction: column; align-items: flex-start; gap: 10px; }
}
</style>
</head>

function useScrolled() {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 20);
    window.addEventListener("scroll", fn, { passive: true });
    fn();
    return () => window.removeEventListener("scroll", fn);
  }, []);
  return scrolled;
}

        </div>
        <div className="fc-tags">
          {recipe.tags.map(t => <TagPill key={t} label={t} />)}
        </div>
        <div className="fc-highlight">✦ {recipe.highlight}</div>
      </div>
      <div className="fc-cta">
        <span>Cook it now</span>
        <span>→</span>
      </div>
    </a>
  );
}

function RecipeCard({ recipe }) {
  return (
    <a href={`recipes/${recipe.id}.html`} className="recipe-card">
      <div className="rc-left" style={{ background: recipe.colorSoft }}>
        {recipe.emoji}
      </div>
      <div className="rc-body">
        <div className="rc-name">{recipe.name}</div>
        <div className="rc-meta">
          <span>{recipe.cuisine}</span>
          <span className="rc-meta-sep">·</span>
          <span>{recipe.totalMinutes} min</span>
          <span className="rc-meta-sep">·</span>
          <span>{recipe.difficulty}</span>
        </div>
        <div className="rc-tags">
          {recipe.tags.map(t => <RcTag key={t} label={t} />)}
        </div>
      </div>
      <div className="rc-arrow">→</div>
    </a>
  );
}

function App() {
  const [query, setQuery] = useState("");
  const [filter, setFilter] = useState("");
  const inputRef = useRef(null);

  const filtered = useMemo(() => {
    let list = RECIPES;
    if (filter === "vegetarian") list = list.filter(r => r.tags.includes("vegetarian") || r.tags.includes("vegan"));
    else if (filter === "non-veg") list = list.filter(r => r.tags.includes("non-veg"));
    else if (filter === "easy") list = list.filter(r => r.difficulty === "Easy");
    else if (filter === "quick") list = list.filter(r => r.totalMinutes <= 30);
    else if (filter === "south") list = list.filter(r => r.cuisine === "South Indian");
    if (query.trim()) {
      const q = query.toLowerCase();
      list = list.filter(r =>
        r.name.toLowerCase().includes(q) ||
        r.cuisine.toLowerCase().includes(q) ||
        r.tagline.toLowerCase().includes(q) ||
        r.tags.some(t => t.toLowerCase().includes(q))
      );
    }
    return list;
  }, [query, filter]);

  const searching = query.trim() !== "" || filter !== "";
  const featured = RECIPES.filter(r => r.featured);

  return (
    <>
      <Nav />

      <section className="search-hero">
        <div className="wrap">
          <div className="hero-eyebrow"><span className="eyebrow-dot" /> 10 recipes · guided cooking · nutrition insights</div>
          <h1 className="hero-h1">Top 10 <em>Indian</em> Recipes</h1>
          <p className="hero-sub">Find what you're craving. Cook it with confidence.</p>

          <div className="search-box">
            <input
              ref={inputRef}
              className="search-input"
              placeholder="biryani, paneer, dosa…"
              value={query}
              onChange={e => setQuery(e.target.value)}
            />
            {query && (
              <button className="search-clear" onClick={() => { setQuery(""); inputRef.current?.focus(); }}>✕</button>
            )}
            <button className="search-btn" aria-label="Search">↵</button>
          </div>

          <div className="filter-row">
            {FILTERS.map(f => (
              <button
                key={f.value}
                className={`filter-chip ${filter === f.value ? "active" : ""}`}
                onClick={() => setFilter(f.value)}
              >{f.label}</button>
            ))}
          </div>
        </div>
      </section>

      {!searching && (
        <section className="section">
          <div className="wrap">
            <div className="section-head">
              <div>
                <div className="section-label">// featured picks</div>
                <h2 className="section-title">Start with <em>these.</em></h2>
              </div>
            </div>
            <div className="featured-grid">
              {featured.map(r => <FeaturedCard key={r.id} recipe={r} />)}
            </div>
          </div>
        </section>
      )}

      <hr className="divider" />

      <section className="section">
        <div className="wrap">
          <div className="section-head">
            <div>
              <div className="section-label">// all recipes</div>
              <h2 className="section-title">
                {searching ? "Search results" : "All <em>10</em> recipes".replace("All <em>10</em> recipes", "")}
                {!searching && <><em>All</em> 10 recipes</>}
                {searching && <><em>Results</em></>}
              </h2>
            </div>
            <span className="count-badge">{filtered.length} of {RECIPES.length}</span>
          </div>

          {filtered.length > 0 ? (
            <div className="recipe-grid">
              {filtered.map(r => <RecipeCard key={r.id} recipe={r} />)}
            </div>
          ) : (
            <div className="no-results">
              <span className="hand">¯\_(ツ)_/¯</span>
              <p>No recipes matched "{query}". Try something else.</p>
            </div>
          )}
        </div>
      </section>

      <footer className="footer">
        <div className="wrap footer-inner">
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <span className="brand-mark" style={{ width: 28, height: 28, fontSize: 18 }}>m</span>
            <b style={{ fontWeight: 600 }}>MyFoodCraving</b>
          </div>
          <span className="footer-copy">© 2026 · Infroid Technologies · cook well, live well</span>
        </div>
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
