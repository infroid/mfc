<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MyFoodCraving — Unified Design Prototype</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=Caveat:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="prototype/css/system.css" />
<link rel="stylesheet" href="prototype/css/recipe-detail.css" />

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='15' fill='%23FF6D2E'/><text x='50%25' y='62%25' text-anchor='middle' fill='%23FFFCF3' font-family='Georgia,serif' font-style='italic' font-weight='400' font-size='22'>m</text></svg>" />
</head>

<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="prototype/js/data.js"></script>
<script src="prototype/js/data-recipe-detail.js"></script>
<script type="text/babel" src="prototype/js/shell.jsx"></script>
<script type="text/babel" src="prototype/js/page-recipe-search.jsx"></script>
<script type="text/babel" src="prototype/js/page-chef.jsx"></script>
<script type="text/babel" src="prototype/js/page-utensils.jsx"></script>
<script type="text/babel" src="prototype/js/page-ingredients.jsx"></script>
<script type="text/babel" src="prototype/js/page-admin.jsx"></script>
<script type="text/babel" src="prototype/js/page-recipe-detail.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const PAGES = [
  { id: "recipe-search",    label: "Recipe search",    group: "Public",  Page: () => <RecipeSearchPage /> },
  { id: "recipe-detail",    label: "Recipe detail",    group: "Public",  Page: () => <RecipeDetailPage /> },
  { id: "dashboard",        label: "Dashboard",        group: "User",    Page: () => <DashboardPage /> },
  { id: "account",          label: "Account",          group: "User",    Page: () => <AccountPage /> },
  { id: "profile",          label: "Profile",          group: "User",    Page: () => <ProfilePage /> },
  { id: "chef-recipes",     label: "Chef · recipes",   group: "Chef",    Page: () => <ChefRecipesPage /> },
  { id: "chef-recipe",      label: "Chef · edit recipe", group: "Chef",  Page: () => <ChefRecipePage /> },
  { id: "admin",            label: "Admin · home",     group: "Admin",   Page: () => <AdminDashboardPage /> },
  { id: "admin-ingredients",label: "Ingredients",      group: "Admin",   Page: () => <AdminIngredientsPage /> },
  { id: "admin-ingredient", label: "Ingredient (FDC)", group: "Admin",   Page: () => <AdminIngredientPage /> },
  { id: "admin-utensils",   label: "Utensils",         group: "Admin",   Page: () => <AdminUtensilsPage /> },
  { id: "admin-utensil",    label: "Utensil (WYSIWYG)",group: "Admin",   Page: () => <AdminUtensilPage /> },
  { id: "admin-users",      label: "Users",            group: "Admin",   Page: () => <AdminUsersPage /> },
  { id: "admin-user",       label: "User detail",      group: "Admin",   Page: () => <AdminUserPage /> },
];

const LOCKED = [
  { id: "index",  label: "index.html"  },
];

function ProtoBar({ active, onChange }) {
  return (
    <header className="proto-bar">
      <div className="proto-brand">
        <span className="dot" />
        MFC · Unified Prototype
      </div>
      <div className="proto-tabs">
        {PAGES.map(p => (
          <button
            key={p.id}
            className={"proto-tab " + (active === p.id ? "active" : "")}
            data-screen-label={p.label}
            onClick={() => onChange(p.id)}
            title={p.group + " · " + p.label}
          >{p.label}</button>
        ))}
        {LOCKED.map(p => (
          <span key={p.id} className="proto-tab locked" title="Out of scope per directives">{p.label}</span>
        ))}
      </div>
      <div className="proto-aside">v1 · all originals · cream/editorial</div>
    </header>
  );
}

function App() {
  const initial = (window.location.hash || "#recipe-search").slice(1);
  const known = PAGES.find(p => p.id === initial);
  const [active, setActive] = useState(known ? initial : "recipe-search");

  useEffect(() => {
    function h() {
      const id = (window.location.hash || "#recipe-search").slice(1);
      if (PAGES.find(p => p.id === id)) setActive(id);
    }
    window.addEventListener("hashchange", h);
    return () => window.removeEventListener("hashchange", h);
  }, []);

  function go(id) {
    window.history.replaceState(null, "", "#" + id);
    setActive(id);
    window.scrollTo(0, 0);
  }

  const Current = PAGES.find(p => p.id === active)?.Page || (() => null);
  return (
    <>
      <ProtoBar active={active} onChange={go} />
      <main className="proto-stage" data-screen-label={active}>
        <Current />
      </main>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
