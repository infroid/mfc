<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Indian Recipes — MyFoodCraving</title>
<meta name="description" content="Explore top 10 Indian recipes with guided step-by-step cooking, timers, and nutrition insights." />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=Caveat:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<link rel="icon" type="image/png" href="/assets/img/brand/mfc.png" />

<style>
:root {
  --cream: #F7F1E3;
  --cream-deep: #EFE6CF;
  --cream-soft: #FBF7EC;
  --paper: #FFFCF3;
  --ink: #1F1A14;
  --ink-soft: #3A332A;
  --ink-muted: #6B6253;
  --ink-faint: #9A8F7C;
  --rule: rgba(31, 26, 20, 0.14);
  --rule-strong: rgba(31, 26, 20, 0.28);
  --orange: #FF6D2E;
  --orange-deep: #E2531A;
  --orange-soft: rgba(255, 109, 46, 0.14);
  --matcha: #7A9C5A;
  --matcha-deep: #5E7E40;
  --matcha-soft: rgba(122, 156, 90, 0.18);
  --sans: "Geist", ui-sans-serif, system-ui, -apple-system, sans-serif;
  --serif: "Instrument Serif", "Times New Roman", Georgia, serif;
  --hand: "Caveat", cursive;
  --mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
  --r-sm: 6px;
  --r-md: 12px;
  --r-lg: 20px;
  --container: 1240px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
body { font-family: var(--sans); font-size: 16px; line-height: 1.55; color: var(--ink); background: var(--cream); overflow-x: hidden; }
a { color: inherit; text-decoration: none; }
button { font: inherit; color: inherit; cursor: pointer; border: none; }
::selection { background: var(--orange); color: var(--paper); }

body::before {
  content: "";
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.12 0 0 0 0 0.10 0 0 0 0 0.08 0 0 0 0.5 0'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.4'/></svg>");
  opacity: 0.22; pointer-events: none; mix-blend-mode: multiply; z-index: 1;
}

/* NAV (outer only — inner pieces in assets/js/lib/nav.jsx) */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 50; height: 64px;
  display: flex; align-items: center;
  transition: background 250ms, border-color 250ms;
  border-bottom: 1px solid transparent;
}
.nav.scrolled {
  background: rgba(247, 241, 227, 0.88);
  -webkit-backdrop-filter: blur(14px) saturate(160%);
  backdrop-filter: blur(14px) saturate(160%);
  border-bottom-color: var(--rule);
}

/* LAYOUT */
.wrap { max-width: var(--container); margin: 0 auto; padding: 0 28px; position: relative; z-index: 2; }

/* PAGE HEADER (compact, design-system pattern) */
.rs-page { padding-top: 88px; padding-bottom: 64px; }
.rs-header { padding: 28px 0 18px; display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
.rs-eyebrow { font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 8px; }
.rs-eyebrow::before { content: "// "; color: var(--orange); }
.rs-title { font-family: var(--sans); font-weight: 500; font-size: clamp(34px, 4vw, 52px); line-height: 1.05; letter-spacing: -0.03em; }
.rs-title em { font-family: var(--serif); font-style: italic; font-weight: 400; color: var(--orange); }
.rs-sub { color: var(--ink-soft); font-size: 15px; margin-top: 6px; }

/* TOOLBAR (paper card with pop-shadow) */
.rs-toolbar {
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  padding: 10px 14px; background: var(--paper);
  border: 1.5px solid var(--ink); border-radius: 12px;
  box-shadow: 3px 3px 0 var(--ink);
  margin-bottom: 14px;
}
.rs-toolbar-search {
  flex: 1; min-width: 220px;
  display: flex; align-items: center; gap: 8px;
  padding: 6px 12px;
  background: var(--cream-soft);
  border: 1px solid var(--rule);
  border-radius: 999px;
}
.rs-toolbar-search .ico { color: var(--ink-muted); font-size: 14px; }
.rs-toolbar-search input {
  flex: 1; border: none; background: transparent; outline: none;
  font-family: var(--serif); font-style: italic; font-size: 16px;
  color: var(--ink); min-width: 0;
}
.rs-toolbar-search input::placeholder { color: var(--ink-faint); }
.rs-toolbar-divider { width: 1px; height: 22px; background: var(--rule); }
.rs-cuisine-select {
  background: transparent; border: 1px solid var(--rule); border-radius: 999px;
  padding: 6px 12px; font-size: 12.5px; color: var(--ink); outline: none; cursor: pointer;
  font-family: var(--sans);
}
.rs-segment {
  display: inline-flex; padding: 3px;
  background: var(--cream-deep); border-radius: 999px;
}
.rs-segment button {
  padding: 5px 12px; border-radius: 999px;
  font-size: 12px; font-weight: 500;
  color: var(--ink-muted);
  transition: all 160ms;
  background: transparent;
  white-space: nowrap;
}
.rs-segment button.active {
  background: var(--paper); color: var(--ink);
  box-shadow: 0 1px 0 var(--rule);
}
.rs-toolbar-stat {
  font-family: var(--mono); font-size: 11px;
  color: var(--ink-muted); letter-spacing: 0.04em;
  white-space: nowrap;
}

/* FILTER CHIPS ROW */
.rs-filter-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px; }
.rs-chip {
  padding: 5px 12px; border-radius: 999px; background: var(--paper);
  border: 1px solid var(--rule); font-size: 12px; color: var(--ink-soft);
  cursor: pointer; transition: all 160ms;
}
.rs-chip:hover { background: var(--cream-deep); }
.rs-chip.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.rs-chip.clear { background: transparent; color: var(--berry); border-style: dashed; border-color: var(--berry); }

/* LIST VIEW (denser alternative to grid) */
.rs-list {
  background: var(--paper);
  border: 1.5px solid var(--ink);
  border-radius: 12px;
  box-shadow: 3px 3px 0 var(--ink);
  overflow: hidden;
}
.rs-row {
  display: flex; align-items: center; gap: 14px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--rule);
  transition: background 140ms;
  position: relative;
  text-decoration: none; color: inherit;
}
.rs-row:last-child { border-bottom: none; }
.rs-row:hover { background: var(--cream-soft); }
.rs-row.avoid { background: rgba(200,75,90,0.04); }
.rs-row.avoid:hover { background: rgba(200,75,90,0.08); }
.rs-row-thumb {
  width: 56px; height: 56px; border-radius: 8px;
  flex-shrink: 0; overflow: hidden;
  background: var(--cream-deep);
  position: relative;
  display: grid; place-items: center;
}
.rs-row-thumb img { width: 100%; height: 100%; object-fit: cover; }
.rs-row-thumb .emoji { font-size: 26px; }
.rs-row-body { flex: 1; min-width: 0; }
.rs-row-name { font-family: var(--serif); font-style: italic; font-size: 18px; line-height: 1.15; color: var(--ink); }
.rs-row-meta { font-family: var(--mono); font-size: 10.5px; color: var(--ink-muted); letter-spacing: 0.04em; margin-top: 2px; }
.rs-row-tags { display: flex; gap: 4px; flex-shrink: 0; }
.rs-row-arrow { color: var(--ink-faint); width: 24px; text-align: right; font-size: 16px; flex-shrink: 0; }
.rs-row-badge {
  font-family: var(--mono); font-size: 9.5px; font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase;
  padding: 3px 9px; border-radius: 999px;
  flex-shrink: 0;
}
.rs-row-badge.match { background: var(--matcha-soft); color: var(--matcha-deep); }
.rs-row-badge.avoid { background: rgba(200,75,90,0.14); color: var(--berry); }

/* PAGINATION */
.rs-pagination {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 24px; gap: 12px; flex-wrap: wrap;
  font-family: var(--mono); font-size: 11.5px;
  color: var(--ink-muted); letter-spacing: 0.04em;
}
.rs-pagination-pages { display: flex; gap: 4px; align-items: center; }
.rs-pg-btn {
  min-width: 32px; height: 32px; padding: 0 8px;
  display: grid; place-items: center;
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: 8px;
  color: var(--ink-soft);
  cursor: pointer; transition: all 140ms;
  font-family: var(--mono); font-size: 12px;
}
.rs-pg-btn:hover { border-color: var(--ink); color: var(--ink); }
.rs-pg-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.rs-pg-btn.disabled { opacity: 0.4; cursor: not-allowed; }

/* SOFT-PREF STRIP */
.softpref-strip {
  margin: 18px auto 0; max-width: 740px;
  padding: 10px 14px 10px 18px;
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  background: var(--paper);
  border: 1.5px solid var(--ink);
  border-radius: var(--r-pill);
  box-shadow: 3px 3px 0 var(--ink);
}
.softpref-strip-eyebrow {
  font-family: var(--mono); font-size: 11px;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--ink-muted); white-space: nowrap;
}
.softpref-strip-eyebrow::before { content: "// "; color: var(--orange); }
.softpref-chips { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
.softpref-chip {
  padding: 3px 10px;
  background: var(--cream-deep); color: var(--ink-soft);
  border-radius: 999px;
  font-size: 11.5px; font-weight: 500;
  letter-spacing: -0.01em;
}
.softpref-chip.allergy { background: rgba(200,75,90,.14); color: var(--berry); }
.softpref-chip-more {
  font-family: var(--mono); font-size: 11px;
  color: var(--ink-faint); letter-spacing: 0.04em;
}
.softpref-strip-spacer { flex: 1; }
.softpref-strip-toggle {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--mono); font-size: 11px; font-weight: 500;
  letter-spacing: 0.04em; color: var(--ink-soft);
  cursor: pointer; user-select: none;
}
.softpref-strip-toggle .track {
  width: 32px; height: 18px; border-radius: 999px;
  background: var(--rule-strong); position: relative;
  transition: background 180ms;
}
.softpref-strip-toggle .track::after {
  content: ""; position: absolute; top: 2px; left: 2px;
  width: 14px; height: 14px;
  background: var(--paper); border-radius: 50%;
  box-shadow: 1px 1px 0 var(--ink);
  transition: transform 180ms cubic-bezier(.2,.8,.2,1);
}
.softpref-strip-toggle.on .track { background: var(--orange); }
.softpref-strip-toggle.on .track::after { transform: translateX(14px); }
.softpref-strip-edit {
  font-family: var(--mono); font-size: 11px; font-weight: 500;
  letter-spacing: 0.04em; color: var(--orange-deep);
  white-space: nowrap; padding: 4px 0;
  transition: color 160ms;
}
.softpref-strip-edit::before { content: "↗ "; }
.softpref-strip-edit:hover { color: var(--orange); }
.softpref-strip-dismiss {
  font-family: var(--mono); font-size: 16px; color: var(--ink-faint);
  padding: 2px 6px; cursor: pointer; line-height: 1;
  transition: color 160ms;
}
.softpref-strip-dismiss:hover { color: var(--ink); }

/* MATCH / AVOID overlays on cards */
.match-badge {
  position: absolute; top: -7px; right: -7px;
  padding: 3px 9px;
  background: var(--matcha-deep); color: var(--paper);
  border-radius: 999px;
  font-family: var(--mono); font-size: 9.5px; font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase;
  box-shadow: 1px 1px 0 var(--ink);
  z-index: 4; white-space: nowrap;
}
.avoid-badge {
  position: absolute; top: -7px; right: -7px;
  padding: 3px 9px;
  background: var(--berry); color: var(--paper);
  border-radius: 999px;
  font-family: var(--mono); font-size: 9.5px; font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase;
  box-shadow: 1px 1px 0 var(--ink);
  z-index: 4; white-space: nowrap;
}
.recipe-card { position: relative; }
.recipe-card.avoid { opacity: 0.55; box-shadow: 3px 3px 0 var(--berry); border-color: var(--berry); }
.recipe-card.avoid:hover { opacity: 0.82; box-shadow: 5px 5px 0 var(--berry); }
/* SECTIONS */
.section { padding: 18px 0 56px; position: relative; z-index: 2; }

.tag-pill {
  padding: 4px 10px; border-radius: 999px; font-size: 11.5px;
  background: var(--cream-deep); color: var(--ink-soft); border: 1px solid var(--rule);
  letter-spacing: -0.01em;
}
.tag-pill.veg    { background: var(--matcha-soft);    color: var(--matcha-deep); border-color: transparent; }
.tag-pill.nonveg { background: var(--orange-soft);    color: var(--orange-deep); border-color: transparent; }

/* RECIPE GRID — 4-col on wide screens, collapses on narrow */
.recipe-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
.recipe-card {
  background: var(--paper); border: 1.5px solid var(--ink); border-radius: var(--r-md);
  display: flex; flex-direction: column; overflow: hidden;
  box-shadow: 3px 3px 0 var(--ink);
  transition: transform 200ms cubic-bezier(.2,.8,.2,1), box-shadow 200ms;
  position: relative;
}
.recipe-card:hover { transform: translate(-2px, -2px); box-shadow: 5px 5px 0 var(--ink); }
.rc-img-wrap {
  aspect-ratio: 1 / 1;
  position: relative; overflow: hidden;
  background: var(--cream-deep);
  border-bottom: 1.5px solid var(--ink);
}
.rc-img-wrap.no-media { display: grid; place-items: center; }
.rc-img {
  position: absolute; inset: 0;
  width: 100%; height: 100%; object-fit: cover;
  transform: translate(var(--media-x, 0), var(--media-y, 0)) scale(var(--media-scale, 1));
  transition: transform 320ms cubic-bezier(.2,.8,.2,1);
}
.recipe-card:hover .rc-img { transform: translate(var(--media-x, 0), var(--media-y, 0)) scale(calc(var(--media-scale, 1) * 1.04)); }
.rc-img-fallback { font-size: 56px; line-height: 1; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.16)); }
.rc-img-wrap::after {
  content: ""; position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(31,26,20,0.0) 60%, rgba(31,26,20,0.28) 100%);
  pointer-events: none; z-index: 1;
}
.rc-cuisine {
  position: absolute; bottom: 10px; left: 10px; z-index: 3;
  font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.08em; text-transform: uppercase;
  padding: 4px 9px; background: rgba(255, 252, 243, 0.94); color: var(--ink); border-radius: 999px;
}
.rc-body { padding: 12px 14px 14px; display: flex; flex-direction: column; gap: 8px; }
.rc-name {
  font-family: var(--serif); font-style: italic;
  font-size: 19px; line-height: 1.18; letter-spacing: -0.005em;
}
.rc-meta {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--ink-muted);
  display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
}
.rc-meta-sep { color: var(--rule-strong); }
.rc-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.rc-tag {
  padding: 3px 8px; border-radius: 999px; font-size: 11px;
  background: var(--cream-deep); color: var(--ink-muted); border: 1px solid var(--rule);
}
.rc-tag.veg    { background: var(--matcha-soft); color: var(--matcha-deep); border-color: transparent; }
.rc-tag.nonveg { background: var(--orange-soft); color: var(--orange-deep); border-color: transparent; }

/* NO RESULTS */
.no-results { text-align: center; padding: 72px 24px; }
.no-results .hand { font-family: var(--hand); font-size: 44px; color: var(--orange); display: block; margin-bottom: 10px; }
.no-results p { font-family: var(--serif); font-style: italic; font-size: 24px; color: var(--ink-soft); }

/* DIVIDER */
.divider { border: none; border-top: 1px solid var(--rule); margin: 0; position: relative; z-index: 2; }

/* FOOTER */
.footer {
  border-top: 1.5px solid var(--ink); background: var(--paper);
  padding: 40px 0 24px; position: relative; z-index: 2;
}
.footer-inner {
  display: flex; align-items: center; gap: 28px; flex-wrap: wrap;
  padding-bottom: 22px; border-bottom: 1px dashed var(--rule-strong);
}
.footer-tag {
  font-family: var(--serif); font-style: italic;
  font-size: 18px; color: var(--ink-soft); line-height: 1.4;
  flex: 1; min-width: 220px;
}
.footer-tag em { color: var(--orange); font-style: italic; }
.footer-scribble {
  font-family: var(--hand); font-size: 22px;
  color: var(--orange); transform: rotate(-2deg); display: inline-block;
}
.footer-bottom {
  margin-top: 16px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; flex-wrap: wrap;
  font-family: var(--mono); font-size: 11px;
  letter-spacing: 0.06em; color: var(--ink-muted);
}
.footer-copy { font-family: var(--mono); font-size: 11px; color: var(--ink-muted); }

/* RESPONSIVE */
@media (max-width: 1080px) { .recipe-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 880px) {
  .recipe-grid { grid-template-columns: repeat(2, 1fr); }
  .nav-links { display: none; }
  .rs-toolbar { gap: 8px; padding: 10px 12px; }
  .rs-toolbar-divider { display: none; }
  .rs-toolbar-search { width: 100%; flex: 1 1 100%; min-width: 0; }
  .rs-toolbar-stat { width: 100%; order: 99; }
  /* List rows hide noise on narrow screens (matches design) */
  .rs-row-tags { display: none; }
}
@media (max-width: 640px) {
  .wrap { padding: 0 16px; }
  .rs-page { padding-top: 80px; }
  .rs-header { padding: 18px 0 12px; gap: 12px; }
  .rs-title { font-size: clamp(28px, 7vw, 36px) !important; }
  .rs-segment button { padding: 5px 9px; font-size: 11.5px; }
  .rs-pagination { flex-direction: column; align-items: stretch; gap: 12px; }
  .rs-pagination-pages { justify-content: center; flex-wrap: wrap; }
}
@media (max-width: 480px) {
  .recipe-grid { grid-template-columns: 1fr; }
  /* Make the list view denser on phone */
  .rs-row { padding: 10px 12px; gap: 10px; }
  .rs-row-thumb { width: 48px; height: 48px; }
  .rs-row-name { font-size: 16px; }
  /* iOS-zoom-safe input */
  .rs-toolbar-search input { font-size: 16px; }
}
</style>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;


// Multi-select filter chips. Three pseudo-tags ("quick","easy") map to time
// + difficulty fields; the rest match recipe.tags directly.
const FILTER_CHIPS = [
  { value: "vegetarian",   label: "Vegetarian" },
  { value: "non-veg",      label: "Non-veg" },
  { value: "quick",        label: "Under 30m" },
  { value: "easy",         label: "Easy" },
  { value: "high-protein", label: "High protein" },
  { value: "gluten-free",  label: "GF" },
];

const SORT_OPTIONS = [
  { value: "new",  label: "New" },
  { value: "fast", label: "Fastest" },
  { value: "az",   label: "A–Z" },
];

const PER_PAGE = 12;

function useScrolled() {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 20);
    window.addEventListener("scroll", fn, { passive: true });
    fn();
    return () => window.removeEventListener("scroll", fn);
  }, []);
  return scrolled;
}

function useAuth() {
  const [user, setUser] = useState(window.MFC?.auth?.getUser() || null);
  useEffect(() => {
    const handler = (e) => setUser(e.detail.user);
    window.addEventListener('mfc:auth-change', handler);
    return () => window.removeEventListener('mfc:auth-change', handler);
  }, []);
  return user;
}

function Nav() {
  const user = useAuth();
  const MfcNav = window.MfcNav;
  return MfcNav ? <MfcNav user={user} active="recipes" /> : null;
}

// Ingredient-class tags powering the recipe-prefs classifier — useful for
// allergen flags and identity rules, but visual noise on a card. Hide them
// from card chips; show the user-meaningful tags only.
const HIDDEN_DISPLAY_TAGS = new Set([
  'dairy', 'egg', 'nuts', 'soy', 'shellfish', 'gluten',
  'pork', 'alcohol', 'seafood', 'fish',
  'onion', 'garlic', 'root-veg',
]);

function displayableTags(tags, max) {
  const filtered = (tags || []).filter((t) => !HIDDEN_DISPLAY_TAGS.has(t));
  return typeof max === 'number' ? filtered.slice(0, max) : filtered;
}

function tagToneClass(label) {
  if (label === "vegetarian" || label === "vegan" || label === "gluten-free" || label === "iron-rich" || label === "high-fiber" || label === "high-protein") return "veg";
  if (label === "non-veg") return "nonveg";
  return "";
}

function TagPill({ label }) {
  return <span className={`tag-pill ${tagToneClass(label)}`}>{label}</span>;
}

function RcTag({ label }) {
  return <span className={`rc-tag ${tagToneClass(label)}`}>{label}</span>;
}

const HEART_STYLE = `
.rc-heart{position:absolute;top:10px;left:10px;width:32px;height:32px;border-radius:50%;
  background:rgba(255,252,243,.94);border:1.5px solid var(--ink);display:grid;place-items:center;
  cursor:pointer;font-size:15px;line-height:1;color:rgba(31,29,26,.5);
  box-shadow:1.5px 1.5px 0 var(--ink);
  transition:color 160ms,transform 160ms,box-shadow 160ms;z-index:5}
.rc-heart:hover{color:var(--orange);transform:translate(-1px,-1px);box-shadow:2.5px 2.5px 0 var(--ink)}
.rc-heart.saved{color:var(--orange)}
`;

function HeartButton({ recipeId }) {
  const user = useAuth();
  const [saved, setSaved] = useState(false);
  const [busy, setBusy] = useState(false);
  useEffect(() => {
    if (!user) { setSaved(false); return; }
    let cancelled = false;
    window.MFC?.db?.getSaved().then(rows => {
      if (cancelled) return;
      setSaved((rows || []).some(r => r.recipe_id === recipeId));
    });
    return () => { cancelled = true; };
  }, [user, recipeId]);
  if (!user) return null;
  async function toggle(e) {
    e.preventDefault(); e.stopPropagation();
    if (busy) return;
    setBusy(true);
    const next = !saved;
    setSaved(next);
    const ok = next
      ? await window.MFC?.db?.saveRecipe(recipeId)
      : await window.MFC?.db?.unsaveRecipe(recipeId);
    if (!ok) setSaved(!next);
    setBusy(false);
  }
  return (
    <button className={`rc-heart ${saved ? 'saved' : ''}`} aria-label={saved ? 'Unsave' : 'Save'} onClick={toggle}>
      {saved ? '♥' : '♡'}
    </button>
  );
}

function RecipeCard({ recipe, classification }) {
  const media = recipe.media || {};
  const hero = media.hero || {};
  const heroSrc = hero.src || "";
  const heroFit = hero.fit || {};
  const emoji = media.emoji || "🍽️";
  const isAvoid = classification && classification.violations.length > 0;
  const isMatch = !isAvoid && classification && classification.score > 0;
  const violationReasons = classification ? classification.violations.map(v => v.reason) : [];
  const tooltip = violationReasons.length > 1 ? violationReasons.join(' · ') : undefined;
  const visibleTags = displayableTags(recipe.tags, 3);
  return (
    <a
      href={`recipe.html?id=${recipe.id}`}
      className={"recipe-card" + (isAvoid ? " avoid" : "")}
      title={tooltip}
    >
      {isAvoid && <span className="avoid-badge">{violationReasons[0]}</span>}
      {isMatch && <span className="match-badge">{classification.score} of your prefs</span>}
      <div className={"rc-img-wrap " + (heroSrc ? "" : "no-media")} style={!heroSrc ? { background: recipe.colorSoft } : undefined}>
        {heroSrc ? (
          <img
            className="rc-img"
            src={heroSrc}
            alt={hero.alt || recipe.name}
            loading="lazy"
            style={{
              "--media-scale": heroFit.scale || 1,
              "--media-x": heroFit.x || "0%",
              "--media-y": heroFit.y || "0%",
              objectPosition: heroFit.position || "50% 50%"
            }}
          />
        ) : (
          <div className="rc-img-fallback">{emoji}</div>
        )}
        <HeartButton recipeId={recipe.id} />
        <div className="rc-cuisine">{recipe.cuisine}</div>
      </div>
      <div className="rc-body">
        <div className="rc-name">{recipe.name}</div>
        <div className="rc-meta">
          <span>{recipe.totalMinutes} min</span>
          <span className="rc-meta-sep">·</span>
          <span>{recipe.difficulty}</span>
        </div>
        {visibleTags.length > 0 && (
          <div className="rc-tags">
            {visibleTags.map(t => <RcTag key={t} label={t} />)}
          </div>
        )}
      </div>
    </a>
  );
}

function RecipeRow({ recipe, classification }) {
  const media = recipe.media || {};
  const hero = media.hero || {};
  const heroSrc = hero.src || "";
  const emoji = media.emoji || "🍽️";
  const isAvoid = classification && classification.violations.length > 0;
  const isMatch = !isAvoid && classification && classification.score > 0;
  const violationReasons = classification ? classification.violations.map(v => v.reason) : [];
  const visibleTags = displayableTags(recipe.tags, 3);
  return (
    <a href={`recipe.html?id=${recipe.id}`} className={"rs-row" + (isAvoid ? " avoid" : "")}>
      <div className="rs-row-thumb">
        {heroSrc
          ? <img src={heroSrc} alt={hero.alt || recipe.name} loading="lazy" />
          : <span className="emoji">{emoji}</span>}
      </div>
      <div className="rs-row-body">
        <div className="rs-row-name">{recipe.name}</div>
        <div className="rs-row-meta">{recipe.cuisine} · {recipe.totalMinutes} min · {recipe.difficulty}</div>
      </div>
      {isAvoid && <span className="rs-row-badge avoid">{violationReasons[0]}</span>}
      {isMatch && <span className="rs-row-badge match">match</span>}
      <div className="rs-row-tags">
        {visibleTags.map(t => <RcTag key={t} label={t} />)}
      </div>
      <span className="rs-row-arrow">→</span>
    </a>
  );
}

function Pagination({ page, pageCount, total, perPage, onChange }) {
  if (pageCount <= 1) return null;
  const start = (page - 1) * perPage + 1;
  const end = Math.min(page * perPage, total);
  const pages = [];
  const win = 2;
  for (let i = 1; i <= pageCount; i++) {
    if (i === 1 || i === pageCount || (i >= page - win && i <= page + win)) pages.push(i);
    else if (pages[pages.length - 1] !== "…") pages.push("…");
  }
  return (
    <div className="rs-pagination">
      <span>{start}–{end} of {total}</span>
      <div className="rs-pagination-pages">
        <button className={"rs-pg-btn" + (page === 1 ? " disabled" : "")} disabled={page === 1} onClick={() => onChange(page - 1)}>‹</button>
        {pages.map((p, i) => p === "…"
          ? <span key={"e"+i} style={{ padding: "0 4px", color: "var(--ink-faint)" }}>…</span>
          : <button key={p} className={"rs-pg-btn" + (p === page ? " active" : "")} onClick={() => onChange(p)}>{p}</button>)}
        <button className={"rs-pg-btn" + (page === pageCount ? " disabled" : "")} disabled={page === pageCount} onClick={() => onChange(page + 1)}>›</button>
      </div>
    </div>
  );
}

function SoftPrefStrip({ profile, respect, onToggle, onDismiss }) {
  const tags = [
    ...(profile.diet_tags || []),
    ...(profile.allergies || []),
    ...(profile.goals || []),
  ];
  if (tags.length === 0) return null;
  const visible = tags.slice(0, 2);
  const more = tags.length - visible.length;
  const allergSet = new Set(profile.allergies || []);
  const labelFor = (window.MFC?.tagTaxonomy?.labelFor) || ((t) => t.charAt(0).toUpperCase() + t.slice(1));
  return (
    <div className="softpref-strip" role="region" aria-label="Soft-preference filter">
      <span className="softpref-strip-eyebrow">soft-filtering by your prefs</span>
      <div className="softpref-chips">
        {visible.map((t) => (
          <span key={t} className={"softpref-chip" + (allergSet.has(t) ? " allergy" : "")}>
            {labelFor(t)}
          </span>
        ))}
        {more > 0 && <span className="softpref-chip-more">+{more} more</span>}
      </div>
      <span className="softpref-strip-spacer" />
      <button
        type="button"
        className={"softpref-strip-toggle" + (respect ? " on" : "")}
        onClick={() => onToggle(!respect)}
        aria-pressed={respect}
        title="Toggle whether identity prefs sort and dim recipes"
      >
        <span className="track" aria-hidden="true" />
        Respect my prefs
      </button>
      <a className="softpref-strip-edit" href="my/profile.html">edit</a>
      <button
        type="button"
        className="softpref-strip-dismiss"
        onClick={onDismiss}
        title="Dismiss for this session"
        aria-label="Dismiss soft-pref strip"
      >×</button>
    </div>
  );
}

function readUrlFilters() {
  const p = new URLSearchParams(window.location.search);
  const filterParam = p.get('filter') || '';
  // Back-compat: old single-filter URLs (e.g. ?filter=vegetarian).
  if (filterParam) return new Set(filterParam.split(',').filter(Boolean));
  return new Set();
}

function App() {
  const [query, setQuery]   = useState(() => new URLSearchParams(window.location.search).get('q') || "");
  const [filters, setFilters] = useState(readUrlFilters);
  const [cuisine, setCuisine] = useState(() => new URLSearchParams(window.location.search).get('cuisine') || "all");
  const [sort, setSort]     = useState(() => new URLSearchParams(window.location.search).get('sort') || "new");
  const [view, setView]     = useState(() => sessionStorage.getItem('mfc_search_view') || "grid");
  const [page, setPage]     = useState(1);

  const [recipes, setRecipes] = useState([]);
  const [profile, setProfile] = useState(null);
  const [respect, setRespect] = useState(() => sessionStorage.getItem('mfc_respect_prefs') !== '0');
  const [stripDismissed, setStripDismissed] = useState(() => sessionStorage.getItem('mfc_pref_strip_dismissed') === '1');
  const user = useAuth();

  // Sync search state to URL so results are shareable / deep-linkable.
  useEffect(() => {
    const p = new URLSearchParams();
    if (query.trim()) p.set('q', query.trim());
    if (filters.size > 0) p.set('filter', [...filters].join(','));
    if (cuisine !== 'all') p.set('cuisine', cuisine);
    if (sort !== 'new') p.set('sort', sort);
    const qs = p.toString();
    window.history.replaceState(null, '', window.location.pathname + (qs ? '?' + qs : ''));
  }, [query, filters, cuisine, sort]);

  // Persist view mode for the session.
  useEffect(() => { sessionStorage.setItem('mfc_search_view', view); }, [view]);
  useEffect(() => { sessionStorage.setItem('mfc_respect_prefs', respect ? '1' : '0'); }, [respect]);

  // Fetch recipes from Supabase.
  useEffect(() => {
    window.MFC.db.getRecipes().then(data => { if (data) setRecipes(data); }).catch(() => {});
  }, []);

  // Load (and refresh) the user's soft-pref profile.
  useEffect(() => {
    if (!user) { setProfile(null); return; }
    let cancelled = false;
    const load = () => window.MFC.db.getUserProfile().then(p => { if (!cancelled) setProfile(p); });
    load();
    const onChange = () => load();
    window.addEventListener('mfc:profile-change', onChange);
    return () => { cancelled = true; window.removeEventListener('mfc:profile-change', onChange); };
  }, [user?.id]);

  // Cuisine picker — derived from the loaded recipe list.
  const cuisineOptions = useMemo(() => {
    return [...new Set(recipes.map(r => r.cuisine).filter(Boolean))].sort();
  }, [recipes]);

  // Classify every recipe once per (recipes, profile) pair.
  const classifyMap = useMemo(() => {
    const m = new Map();
    if (!profile || !window.MFC?.recipePrefs) return m;
    for (const r of recipes) m.set(r.id, window.MFC.recipePrefs.classify(r, profile));
    return m;
  }, [recipes, profile]);

  // Master toggle OFF demotes only identity violations; allergy violations
  // still flag (safety floor).
  function effective(c) {
    if (!c) return null;
    if (respect) return c;
    return { score: c.score, violations: c.violations.filter(v => v.kind === 'allergy') };
  }

  function toggleFilter(v) {
    const s = new Set(filters);
    if (s.has(v)) s.delete(v); else s.add(v);
    setFilters(s); setPage(1);
  }

  // Filter + sort. Multi-select chips AND together (each chip narrows).
  const filtered = useMemo(() => {
    let list = recipes;
    if (cuisine !== 'all') list = list.filter(r => r.cuisine === cuisine);
    if (filters.size > 0) {
      list = list.filter(r => {
        for (const f of filters) {
          if (f === 'quick' && r.totalMinutes > 30) return false;
          if (f === 'easy'  && r.difficulty !== 'Easy') return false;
          if (f === 'vegetarian') {
            if (!r.tags.includes('vegetarian') && !r.tags.includes('vegan')) return false;
          } else if (f !== 'quick' && f !== 'easy') {
            if (!r.tags.includes(f)) return false;
          }
        }
        return true;
      });
    }
    if (query.trim()) {
      const q = query.toLowerCase();
      list = list.filter(r =>
        r.name.toLowerCase().includes(q) ||
        (r.cuisine || '').toLowerCase().includes(q) ||
        (r.tagline || '').toLowerCase().includes(q) ||
        (r.tags || []).some(t => t.toLowerCase().includes(q))
      );
    }
    // Pref-aware sort: violations last, then user-chosen sort within.
    const enriched = list.map(r => ({ r, c: effective(classifyMap.get(r.id)) }));
    const cmp = {
      new:  (a, b) => (b.r.created_at || b.r.id || '').localeCompare(a.r.created_at || a.r.id || ''),
      fast: (a, b) => (a.r.totalMinutes || 0) - (b.r.totalMinutes || 0),
      az:   (a, b) => (a.r.name || '').localeCompare(b.r.name || ''),
    }[sort] || ((a, b) => 0);
    enriched.sort((a, b) => {
      const va = (a.c && a.c.violations.length > 0) ? 1 : 0;
      const vb = (b.c && b.c.violations.length > 0) ? 1 : 0;
      if (va !== vb) return va - vb;
      // Pref score outranks user sort when profile-driven classification is on.
      if (profile) {
        const sa = a.c ? a.c.score : 0;
        const sb = b.c ? b.c.score : 0;
        if (sa !== sb) return sb - sa;
      }
      return cmp(a, b);
    });
    return enriched.map(x => x.r);
  }, [recipes, query, filters, cuisine, sort, profile, respect, classifyMap]);

  // Reset to page 1 when filter inputs change.
  useEffect(() => { setPage(1); }, [query, filters, cuisine, sort]);

  const pageCount = Math.max(1, Math.ceil(filtered.length / PER_PAGE));
  useEffect(() => { if (page > pageCount) setPage(1); }, [pageCount, page]);
  const slice = filtered.slice((page - 1) * PER_PAGE, page * PER_PAGE);

  const hasAnyTags = profile && (
    (profile.diet_tags?.length > 0) ||
    (profile.allergies?.length > 0) ||
    (profile.goals?.length > 0)
  );
  const showStrip = !!user && !!profile && hasAnyTags && !stripDismissed;

  return (
    <>
      <style>{HEART_STYLE}</style>
      <Nav />

      <main className="rs-page">
        <div className="wrap">
          <div className="rs-header">
            <div>
              <div className="rs-eyebrow">discover</div>
              <h1 className="rs-title">All <em>recipes</em></h1>
              <p className="rs-sub">{recipes.length} recipes · guided cooking · nutrition aware</p>
            </div>
          </div>

          {showStrip && (
            <div style={{ marginBottom: 14 }}>
              <SoftPrefStrip
                profile={profile}
                respect={respect}
                onToggle={setRespect}
                onDismiss={() => {
                  sessionStorage.setItem('mfc_pref_strip_dismissed', '1');
                  setStripDismissed(true);
                }}
              />
            </div>
          )}

          <div className="rs-toolbar">
            <div className="rs-toolbar-search">
              <span className="ico">⌕</span>
              <input
                value={query}
                onChange={e => setQuery(e.target.value)}
                placeholder="paneer, ramen, dosa…"
                aria-label="Search recipes"
              />
              {query && (
                <button onClick={() => setQuery("")}
                  style={{ background: "none", padding: "0 4px", color: "var(--ink-muted)", lineHeight: 1, fontSize: 16 }}
                  aria-label="Clear search">×</button>
              )}
            </div>

            <span className="rs-toolbar-divider" />

            <select
              className="rs-cuisine-select"
              value={cuisine}
              onChange={e => setCuisine(e.target.value)}
              aria-label="Filter by cuisine"
            >
              <option value="all">All cuisines</option>
              {cuisineOptions.map(c => <option key={c} value={c}>{c}</option>)}
            </select>

            <span className="rs-toolbar-divider" />

            <div className="rs-segment" role="tablist" aria-label="Sort">
              {SORT_OPTIONS.map(o => (
                <button
                  key={o.value}
                  role="tab"
                  aria-selected={sort === o.value}
                  className={sort === o.value ? "active" : ""}
                  onClick={() => setSort(o.value)}
                >{o.label}</button>
              ))}
            </div>

            <span style={{ flex: 1 }} />

            <span className="rs-toolbar-stat">{filtered.length} matches</span>

            <span className="rs-toolbar-divider" />

            <div className="rs-segment" role="tablist" aria-label="View mode">
              <button
                role="tab"
                aria-selected={view === "grid"}
                className={view === "grid" ? "active" : ""}
                onClick={() => setView("grid")}
              >▦ Grid</button>
              <button
                role="tab"
                aria-selected={view === "list"}
                className={view === "list" ? "active" : ""}
                onClick={() => setView("list")}
              >≡ List</button>
            </div>
          </div>

          <div className="rs-filter-row">
            {FILTER_CHIPS.map(f => (
              <button
                key={f.value}
                className={"rs-chip" + (filters.has(f.value) ? " active" : "")}
                onClick={() => toggleFilter(f.value)}
              >{f.label}</button>
            ))}
            {filters.size > 0 && (
              <button className="rs-chip clear" onClick={() => { setFilters(new Set()); setPage(1); }}>
                clear ×
              </button>
            )}
          </div>

          {slice.length === 0 ? (
            <div className="no-results">
              <span className="hand">¯\_(ツ)_/¯</span>
              <p>{query.trim() || filters.size > 0 || cuisine !== 'all'
                  ? `No recipes matched. Try fewer filters.`
                  : `No recipes yet — chefs are still cooking.`}</p>
            </div>
          ) : view === "grid" ? (
            <div className="recipe-grid">
              {slice.map(r => (
                <RecipeCard
                  key={r.id}
                  recipe={r}
                  classification={effective(classifyMap.get(r.id))}
                />
              ))}
            </div>
          ) : (
            <div className="rs-list">
              {slice.map(r => (
                <RecipeRow
                  key={r.id}
                  recipe={r}
                  classification={effective(classifyMap.get(r.id))}
                />
              ))}
            </div>
          )}

          <Pagination
            page={page}
            pageCount={pageCount}
            total={filtered.length}
            perPage={PER_PAGE}
            onChange={(p) => { setPage(p); window.scrollTo({ top: 0, behavior: 'smooth' }); }}
          />
        </div>
      </main>

      <footer className="footer">
        <div className="wrap">
          <div className="footer-inner">
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <img className="brand-mark" src="/assets/img/brand/mfc.png" alt="MyFoodCraving" style={{ width: 32, height: 32 }} />
              <b style={{ fontWeight: 600 }}>MyFoodCraving</b>
            </div>
            <p className="footer-tag">Cook well, <em>live well</em>. <span className="footer-scribble">made with love ↘</span></p>
          </div>
          <div className="footer-bottom">
            <span>© 2026 · Infroid Technologies</span>
            <span>cream · editorial · cook with confidence</span>
          </div>
        </div>
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
